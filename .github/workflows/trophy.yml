# Place this file at: .github/workflows/trophy.yml in your EmaAnd8/EmaAnd8 repo
#
# Generates trophy.svg INSIDE this repo (the public trophy vercel instance is
# disabled — HTTP 402 — so we self-generate like the other cards).
#
# Security notes:
# - The action ref is PINNED to a commit SHA (head of Erik-Donath's
#   feature/generate-svg branch as of 2026-07-10, the action endorsed by the
#   official github-profile-trophy README). A SHA is immutable — nobody can
#   change what code runs here.
# - Uses the built-in GITHUB_TOKEN (repo-scoped, expires after the run), NOT
#   your PAT — least privilege when running third-party code.
#   If the run ever fails with an auth/API error, switch the token line to:
#   token: ${{ secrets.METRICS_TOKEN }}

name: Generate trophies

on:
  schedule:
    - cron: "45 3 * * *" # daily at 03:45 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trophy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate trophy SVG
        uses: ryo-ma/github-profile-trophy@v2
        with:
          username: ${{ github.repository_owner }}
          theme: tokyonight
          no-frame: false
          margin-width: 8

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trophy.svg
          git diff --cached --quiet || git commit -m "Update trophy.svg"
          git push
